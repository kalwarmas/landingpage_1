<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayesha Gold Trader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #FFD700;
            --primary-dark: #E6B800;
            --light-bg: #FAF9F6;
            --card-bg: #FFFFFF;
            --text: #1F2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FAF9F6 0%, #F5F0E6 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .hero {
            padding: 50px 30px 40px;
            text-align: center;
            background: linear-gradient(145deg, #FFFFFF, #F8F4EB);
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid var(--primary);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.25);
            margin-bottom: 24px;
        }

        .name {
            font-size: 2.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .title {
            font-size: 1.35rem;
            font-weight: 600;
            color: #D97706;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
            background: rgba(255, 215, 0, 0.1);
            padding: 12px 24px;
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .stats-icon {
            font-size: 1.4rem;
        }

        .subscriber-count {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1F2937;
        }

        .subscribe-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(90deg, #FFD700, #E6B800);
            color: #1F2937;
            font-size: 1.25rem;
            font-weight: 700;
            padding: 18px 48px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
            text-decoration: none;
            margin-bottom: 30px;
        }

        .subscribe-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.5);
        }

        .icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .icon {
            font-size: 2rem;
            color: #D97706;
            opacity: 0.85;
        }

        .telegram-info {
            text-align: center;
            padding: 20px 30px;
            background: #F8F4EB;
            color: #854D0E;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #6B7280;
            background: #F9FAFB;
        }
    </style>
</head>
<body>

    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1271261881834153');

    <noscript>
        <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=1271261881834153&ev=PageView&noscript=1"/>
    </noscript>
    <!-- End Meta Pixel Code -->

    <div class="container">
        <div class="hero">
            <!-- Logo -->
            <img src="logo.jpg" alt="Ayesha Gold Trader" class="logo">

            <!-- Name -->
            <div class="name">Ayesha Gold Trader</div>
            <br>
            <br>
            <!-- Stats -->
            <div class="stats">
                <span class="stats-icon">👥</span>
                <span class="subscriber-count">1200+ Active Subscribers</span>
            </div>

            <!-- Subscribe Button (With Click Tracker) -->
            <a href="https://t.me/Ayeshafxqueen" target="_blank" class="subscribe-btn" id="telegram-subscribe-link">
                <span>Join Telegram Channel</span>
                <span style="font-size: 1.6rem;">→</span>
            </a>

        </div>

        <div class="telegram-info">
            <strong>Official Channel</strong>
        </div>

        <div class="footer">
            © 2026 Ayesha Gold Trader • All Rights Reserved
        </div>
    </div>

    <!-- Custom Event Script -->
    <script>
        document.getElementById('telegram-subscribe-link').addEventListener('click', function() {
            // Manually triggers the standard "Subscribe" event in Meta Pixel
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Subscribe');
            }
        });
    </script>

</body>
</html>
